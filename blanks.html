			<section class="letters card">
				<div class="letters-title title">
					<img
						src="images/icons/letter-icon.svg"
						alt="Letters icon"
						width="32"
					/>
					<h2>Письма</h2>
					<img
						src="images/icons/add.svg"
						alt="Add icon"
						width="32"
						data-action="add"
						class="admin-icon admin-icon-add"
					/>
				</div>
				<div class="letters-menu menu"></div>
			</section>

			<section class="orders card">
				<div class="orders-title title">

					<img
						src="images/icons/add.svg"

						alt="Add icon"

						data-action="add"
						class="admin-icon admin-icon-add"
					/>
				</div>
				<div class="dispositions-menu menu"></div>
			</section>

			<section class="service-notes card">
				<div class="service-notes-title title">
					<img
						src="images/icons/service-notes-icon.svg"
						alt="Service notes icon"
						width="32"
					/>
					<h2>Служебные записки</h2>
					<img
						src="images/icons/add.svg"
						alt="Add icon"
						width="32"
						data-action="add"
						class="admin-icon admin-icon-add"
					/>
